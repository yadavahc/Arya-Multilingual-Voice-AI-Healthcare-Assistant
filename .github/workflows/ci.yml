name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api-tests:
    name: API — lint + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r services/api/requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check services/api apps/agent
      - name: Run tests
        working-directory: services/api
        run: pytest tests -q

  web-build:
    name: Web — typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        working-directory: apps/web
        run: npx tsc --noEmit
      - name: Build
        working-directory: apps/web
        run: npm run build
